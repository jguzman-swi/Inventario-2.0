services:
  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./web/.env
    depends_on:
      - api
